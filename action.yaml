---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# sonarqube-cloud-scan-action
name: '🔐 SonarCube Cloud Scan'
description: 'Performs a SonarQube Cloud scan and uploads the results'

# yamllint disable rule:line-length

# See: https://docs.sonarsource.com/sonarqube-server/latest/project-administration/analysis-scope/
# Create a file at the top of the repository called:
#   sonar-project.properties
# e.g. For Python projects, define directories for source code and tests:
# sonar.sources = src/
# sonar.tests = test/

inputs:
  # Mandatory
  sonar_token:
    description: 'SonarQube API key/token'
    required: true
  # Optional
  no_checkout:
    description: 'Do not checkout local repository; used for testing'
    required: false
    default: 'false'
  sonar_root_cert:
    description: 'Server root certificate PEM encoded'
    required: false
  build_wrapper_url:
    # e.g. https://raw.githubusercontent.com/o-ran-sc/ci-management/refs/heads/master/jjb/com-golog/prescan-golog-go-ubuntu.sh
    description: 'HTTPS download location of build wrapper/script'
    required: false
  build_wrapper_out_dir:
    description: 'Filesystem location of build outputs'
    required: false
  prescan_script_url:
    # e.g. a Go/Python coverage generator run before the scan.
    description: >-
      HTTPS URL of a script to download and execute with bash after
      checkout but before the scan, WITHOUT the C/C++ build wrapper.
      Use for languages (Go, Python, ...) that need a pre-scan step
      such as generating a coverage report, but must not be wrapped
      by build-wrapper. Must use HTTPS and is mutually exclusive with
      build_wrapper_url.
    required: false
  sonar_host_url:
    description: 'Uploads scans to the given host URL'
    required: false
    default: 'https://sonarcloud.io'
  lc_all:
    description: 'Change when code character set is outside the range of en_US.UTF-8'
    required: false
    default: "en_US.UTF-8"
  debug:
    description: 'Enable debugging output'
    required: false
    default: 'false'
  github_token:
    description: 'GitHub token for API access (optional, improves metadata accuracy)'
    required: false
    default: ''
  project_base_dir:
    description: 'Set the sonar.projectBaseDir analysis property'
    required: false
    default: '.'
  scanner_version:
    description: 'Version of the Sonar Scanner CLI to use'
    required: false
  skip_jre_provisioning:
    # SonarSource is deprecating the bundled Java 17 runtime; support
    # ends July 2026. Letting the scanner provision its own JRE keeps
    # the runtime current automatically.
    # See: https://docs.sonarsource.com/sonarqube-server/analyzing-source-code/scanners/scanner-environment/managing-jre-auto-provisioning/
    description: 'Skip JRE auto-provisioning by the Sonar Scanner CLI'
    required: false
    default: 'false'
  args:
    description: 'Arguments to pass to the Sonar Scanner CLI (e.g., "-Dsonar.verbose=true")'
    required: false
    default: '-Dsonar.scanner.cache.enabled=false'

outputs:
  sonar_org:
    description: 'SonarQube organization'
    value: ${{ steps.sonar-config.outputs.sonar_org }}
  project_key:
    description: 'SonarQube project key'
    value: ${{ steps.sonar-config.outputs.project_key }}
  config_file:
    description: 'Path to SonarQube configuration file'
    value: ${{ steps.sonar-config.outputs.config_file }}

runs:
  using: 'composite'
  steps:
    - name: 'Checkout repository'
      if: inputs.no_checkout != 'true'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        # Disabling shallow clones recommended to improve reporting accuracy
        fetch-depth: 0
        persist-credentials: false

    - name: 'Repository metadata'
      id: repository-metadata
      uses: lfreleng-actions/repository-metadata-action@0da2220a78de8cc60be6f7edd6feefd658311f20 # v0.2.4
      with:
        github_token: ${{ inputs.github_token }}

    - name: 'Process SonarQube configuration'
      id: sonar-config
      shell: bash
      env:
        PROJECT_BASE_DIR: ${{ inputs.project_base_dir }}
        REPO_OWNER: ${{ steps.repository-metadata.outputs.repository_owner }}
        REPO_NAME: ${{ steps.repository-metadata.outputs.repository_name }}
      run: |
        # Process SonarQube configuration
        SONAR_PROPS="$PROJECT_BASE_DIR/sonar-project.properties"
        SONARCLOUD_PROPS="$PROJECT_BASE_DIR/.sonarcloud.properties"
        CONFIG_FILE=""

        if [ -f "$SONAR_PROPS" ]; then
          CONFIG_FILE="$SONAR_PROPS"
        elif [ -f "$SONARCLOUD_PROPS" ]; then
          CONFIG_FILE="$SONARCLOUD_PROPS"
        fi

        # If no config file exists, create ephemeral one
        if [ -z "$CONFIG_FILE" ]; then
          echo '⚠️ Repository is missing a SonarQube configuration file'
          echo 'https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/'
          echo '### ⚠️ Repository is missing a SonarQube configuration file' >> "$GITHUB_STEP_SUMMARY"
          echo 'https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/' >> "$GITHUB_STEP_SUMMARY"

          CONFIG_FILE="$SONAR_PROPS"
          mkdir -p "$(dirname "$CONFIG_FILE")"
          cat > "$CONFIG_FILE" <<EOF
        sonar.organization=${REPO_OWNER}
        sonar.projectKey=${REPO_NAME}
        sonar.scm.exclusions.disabled=true
        EOF
          echo "Created: $CONFIG_FILE"
        else
          echo 'SonarQube configuration present ✅'
          echo '### SonarQube configuration present ✅' >> "$GITHUB_STEP_SUMMARY"
        fi

        # Set config_file as step output after potential file creation
        echo "config_file=$CONFIG_FILE" >> "$GITHUB_OUTPUT"

        # Extract and output configuration values (strip whitespace and quotes)
        SONAR_ORG=$(grep -E "^sonar.organization=" "$CONFIG_FILE" | cut -d'=' -f2- | xargs || echo "")
        SONAR_PROJECT_KEY=$(grep -E "^sonar.projectKey=" "$CONFIG_FILE" | cut -d'=' -f2- | xargs || echo "")

        echo "sonar_org=$SONAR_ORG" >> "$GITHUB_OUTPUT"
        echo "project_key=$SONAR_PROJECT_KEY" >> "$GITHUB_OUTPUT"

        if [ -n "$SONAR_ORG" ]; then
          echo "- **Organization**: $SONAR_ORG" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ -n "$SONAR_PROJECT_KEY" ]; then
          echo "- **Project Key**: $SONAR_PROJECT_KEY" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: 'Validate pre-scan inputs'
      if: inputs.build_wrapper_url != '' || inputs.prescan_script_url != ''
      shell: bash
      env:
        BUILD_WRAPPER_URL: ${{ inputs.build_wrapper_url }}
        PRESCAN_SCRIPT_URL: ${{ inputs.prescan_script_url }}
      run: |
        # build_wrapper_url and prescan_script_url are mutually exclusive
        if [ -n "$BUILD_WRAPPER_URL" ] && [ -n "$PRESCAN_SCRIPT_URL" ]; then
          echo 'Error: build_wrapper_url and prescan_script_url are mutually exclusive ❌'
          exit 1
        fi
        # Reject insecure URLs before any download occurs
        if [ -n "$BUILD_WRAPPER_URL" ]; then
          case "$BUILD_WRAPPER_URL" in
            https://*) ;;
            *)
              echo 'Error: build_wrapper_url must use HTTPS ❌'
              exit 1
              ;;
          esac
        fi
        if [ -n "$PRESCAN_SCRIPT_URL" ]; then
          case "$PRESCAN_SCRIPT_URL" in
            https://*) ;;
            *)
              echo 'Error: prescan_script_url must use HTTPS ❌'
              exit 1
              ;;
          esac
        fi

    - name: 'Download remote build script'
      if: inputs.build_wrapper_url != ''

      uses: lfreleng-actions/url-download-action@77920845b3cef96fac9ef287dcff261b24a12341 # v0.1.5
      with:
        url: ${{ inputs.build_wrapper_url }}

    - name: 'Validate required input parameters'
      if: inputs.build_wrapper_url != ''
      shell: bash
      env:
        BUILD_WRAPPER_OUT_DIR: ${{ inputs.build_wrapper_out_dir }}
      run: |
        # Validate required input parameters
        if [ -z "$BUILD_WRAPPER_OUT_DIR" ]; then
          echo 'Error: build outputs directory must be specified when using a build wrapper ❌'
          exit 1
        fi

    - name: 'Install build wrapper'
      if: inputs.build_wrapper_url != ''

      uses: SonarSource/sonarqube-scan-action/install-build-wrapper@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0

    - name: 'Run build wrapper'
      if: inputs.build_wrapper_url != ''
      shell: bash
      env:
        BUILD_WRAPPER_URL: ${{ inputs.build_wrapper_url }}
        BUILD_WRAPPER_OUT_DIR: ${{ inputs.build_wrapper_out_dir }}
      run: |
        # Run build wrapper 🧱
        BUILD_SCRIPT="./$(basename "$BUILD_WRAPPER_URL")"
        chmod u+x "$BUILD_SCRIPT"
        if [ ! -d "$BUILD_WRAPPER_OUT_DIR" ]; then
          mkdir -p "$BUILD_WRAPPER_OUT_DIR"
          echo "Created build wrapper output directory: $BUILD_WRAPPER_OUT_DIR"
        fi
        echo "Running: build-wrapper-linux-x86-64 --out-dir $BUILD_WRAPPER_OUT_DIR $BUILD_SCRIPT"
        build-wrapper-linux-x86-64 --out-dir "$BUILD_WRAPPER_OUT_DIR" "$BUILD_SCRIPT"

    - name: 'Download remote pre-scan script'
      if: inputs.prescan_script_url != ''

      uses: lfreleng-actions/url-download-action@77920845b3cef96fac9ef287dcff261b24a12341 # v0.1.5
      with:
        url: ${{ inputs.prescan_script_url }}
        # Save outside the workspace (into the runner temp dir) so the
        # script is never scanned as a source file or clobbers a repo
        # file, and needs no filename reconstruction from the URL (the
        # action exposes no outputs).
        path: ${{ runner.temp }}/prescan-script

    - name: 'Run pre-scan script'
      if: inputs.prescan_script_url != ''
      shell: bash
      env:
        PRESCAN_SCRIPT: ${{ runner.temp }}/prescan-script
      run: |
        # Run pre-scan script (no build wrapper) 🧪
        if [ ! -f "$PRESCAN_SCRIPT" ]; then
          echo "Error: pre-scan script not downloaded: $PRESCAN_SCRIPT ❌"
          exit 1
        fi
        chmod u+x "$PRESCAN_SCRIPT"
        echo "Running pre-scan script: $PRESCAN_SCRIPT"
        bash -- "$PRESCAN_SCRIPT"

    - name: 'Debug action/environment'
      if: inputs.debug == 'true'
      shell: bash
      env:
        PROJECT_BASE_DIR: ${{ inputs.project_base_dir }}
        CONFIG_FILE_PATH: ${{ steps.sonar-config.outputs.config_file }}
        WORKSPACE: ${{ github.workspace }}
      run: |
        # Debug action/environment
        CONFIG_FILE="$CONFIG_FILE_PATH"
        echo "Debug logging enabled 🐞"
        echo "Current directory: $(pwd)"
        echo "GitHub workspace: $WORKSPACE"
        echo "Project base dir: $PROJECT_BASE_DIR"
        if [ -n "$CONFIG_FILE" ]; then
          echo "Scan configuration file: $CONFIG_FILE"
        fi
        echo "Directory content (workspace root):"
        ls -la
        if [ "$PROJECT_BASE_DIR" != "." ]; then
          echo ""
          echo "Directory content (project base dir):"
          ls -la "$PROJECT_BASE_DIR" || echo "Project base dir not found"
        fi

    - name: 'SonarQube Scan'
      id: sonar-scan

      uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
      env:
        SONAR_TOKEN: ${{ inputs.sonar_token }}
        SONAR_HOST_URL: ${{ inputs.sonar_host_url }}
        SONAR_ROOT_CERT: ${{ inputs.sonar_root_cert }}
        SONAR_VERBOSE: ${{ inputs.debug }}
        LC_ALL: ${{ inputs.lc_all }}
        SONAR_SCANNER_OPTS: "-Dsonar.scanner.skipJreProvisioning=${{ inputs.skip_jre_provisioning }}"
      with:
        projectBaseDir: ${{ inputs.project_base_dir }}
        scannerVersion: ${{ inputs.scanner_version || '7.2.0.5079' }}
        args: ${{ inputs.args }}

    - name: 'Parse scan output'
      id: parse-output
      shell: bash
      env:
        PROJECT_BASE_DIR: ${{ inputs.project_base_dir }}
      run: |
        # Parse scan output
        REPORT_TASK_FILE="$PROJECT_BASE_DIR/.scannerwork/report-task.txt"

        if [ -f "$REPORT_TASK_FILE" ]; then
          echo "Scanner report task file found 📁"
        else
          echo "Scanner report task file not found 🚫"
        fi

        # Check for NOT_BOUND in report-task.txt
        if [ -f "$REPORT_TASK_FILE" ] && grep -q "NOT_BOUND" "$REPORT_TASK_FILE"; then
          echo "not_bound=true" >> "$GITHUB_OUTPUT"
        else
          echo "not_bound=false" >> "$GITHUB_OUTPUT"
        fi

        # Output report file path for reuse in subsequent steps
        echo "report_task_file=$REPORT_TASK_FILE" >> "$GITHUB_OUTPUT"

    - name: 'Print summary/job output'
      shell: bash
      # yamllint disable rule:line-length
      env:
        DEBUG: ${{ inputs.debug }}
        REPORT_TASK_FILE_PATH: ${{ steps.parse-output.outputs.report_task_file }}
        PROJECT_KEY_IN: ${{ steps.sonar-config.outputs.project_key }}
        REPO_OWNER: ${{ steps.repository-metadata.outputs.repository_owner }}
        REPO_NAME: ${{ steps.repository-metadata.outputs.repository_name }}
        NOT_BOUND: ${{ steps.parse-output.outputs.not_bound }}
      run: |
        # Print summary/job output
        # Extract the dashboard URL from .scannerwork/report-task.txt if available
        DEBUG_MODE="$DEBUG"
        DASHBOARD_URL=""
        REPORT_TASK_FILE="$REPORT_TASK_FILE_PATH"

        # Extract PROJECT_KEY early so it's available for NOT_BOUND warning
        PROJECT_KEY="$PROJECT_KEY_IN"

        # Extract dashboard URL from report-task.txt
        if [ -f "$REPORT_TASK_FILE" ]; then
          DASHBOARD_URL=$(grep -E "^dashboardUrl=" "$REPORT_TASK_FILE" | cut -d'=' -f2-)
        fi

        # Fallback to constructing URL if not found in report-task.txt
        if [ -z "$DASHBOARD_URL" ]; then
          if [ -n "$PROJECT_KEY" ]; then
            DASHBOARD_URL="https://sonarcloud.io/dashboard?id=${PROJECT_KEY}"
          else
            # Last resort: use repository metadata
            DASHBOARD_URL="https://sonarcloud.io/project/overview?id=${REPO_OWNER}_${REPO_NAME}"
          fi
        fi

        # Debug output consolidated in one code block
        if [ "$DEBUG_MODE" = "true" ]; then
          echo "Debug: Checking for report-task.txt at: $REPORT_TASK_FILE"
          if [ -f "$REPORT_TASK_FILE" ]; then
            echo "Debug: report-task.txt found, contents:"
            cat "$REPORT_TASK_FILE"
          else
            echo "Debug: report-task.txt not found"
          fi
          echo "Debug: PROJECT_KEY=$PROJECT_KEY"
          echo "Debug: Final dashboard URL: $DASHBOARD_URL"
        fi

        echo '## 🔐 SonarQube Cloud Scan Results Updated' >> "$GITHUB_STEP_SUMMARY"
        echo "🔗 ${DASHBOARD_URL}" >> "$GITHUB_STEP_SUMMARY"

        # Check for NOT_BOUND condition
        if [ "$NOT_BOUND" = "true" ]; then
          echo "⚠️ WARNING: Project is NOT_BOUND to GitHub repository"
          echo "### ⚠️ Project Binding Warning" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The SonarCloud project exists in SonarCloud but is not linked to your GitHub repository." >> "$GITHUB_STEP_SUMMARY"
          echo "See: https://docs.sonarsource.com/sonarqube-cloud/getting-started/github" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
        fi
